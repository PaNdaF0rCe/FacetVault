<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="icon" type="image/png" sizes="48x48" href="/logo.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="manifest" href="/manifest.json" />

  <meta name="theme-color" content="#060b16" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Typography: Inter (UI) + Cormorant Garamond (display serif) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin />
  <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com" />
  <link
    rel="preload"
    as="style"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap"
  />
  <link
    rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap"
  />

  <!-- SEO -->
  <meta name="robots" content="index, follow" />
  <meta name="author" content="FacetVault" />
  <meta
    name="description"
    content="Browse natural Ceylon sapphires and curated gemstones directly from Sri Lanka. Each stone is individually documented and available for direct inquiry."
  />

  <!-- Structured Data — Organization -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FacetVault",
      "url": "https://facetvault.store",
      "logo": "https://facetvault.store/logo.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["English", "Sinhala"]
      }
    }
  </script>

  <!-- Canonical (default — overridden per page by react-helmet-async) -->
  <link rel="canonical" href="https://facetvault.store/" />

  <!-- Open Graph (default — overridden per page) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="FacetVault" />
  <meta property="og:url" content="https://facetvault.store/" />
  <meta property="og:title" content="FacetVault | Ceylon Sapphires & Curated Gemstones" />
  <meta
    property="og:description"
    content="Explore curated natural gemstones and Ceylon sapphires sourced directly from Sri Lanka. Clear details, direct inquiry, no clutter."
  />
  <meta property="og:image" content="https://facetvault.store/logo.png" />

  <!-- Twitter Card (default — overridden per page) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@facetvault" />
  <meta name="twitter:title" content="FacetVault | Ceylon Sapphires & Curated Gemstones" />
  <meta
    name="twitter:description"
    content="Explore curated natural gemstones and Ceylon sapphires sourced directly from Sri Lanka. Clear details, direct inquiry, no clutter."
  />
  <meta name="twitter:image" content="https://facetvault.store/logo.png" />

  <!-- Google Verification -->
  <meta name="google-site-verification" content="qmpawpM-HX-7CzCNLMynmw8ErqJrlB2zJP7ErezYUY0" />

  <title>FacetVault | Ceylon Sapphires & Curated Gemstones from Sri Lanka</title>
</head>

<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
